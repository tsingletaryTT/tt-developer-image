# .github/workflows/docker-build.yml
#
# Builds, smoke-tests on real N150 hardware, and publishes the Tenstorrent
# developer image.
#
# Runner requirement:
#   This workflow MUST run on a self-hosted runner that:
#     - Is the physical N150 host (or has /dev/tenstorrent mapped into it)
#     - Has Docker installed and the runner user in the `docker` group
#     - Has 100+ GB free disk and 16+ GB RAM for the tt-metal source build
#     - Is registered with the label  tt-n150  (see setup instructions below)
#
# How to register the runner — run these ON the N150 host:
#
#   1. Go to: https://github.com/tsingletaryTT/tt-developer-image/settings/actions/runners/new
#   2. Select: Linux / x64
#   3. Follow the download + configure steps shown on that page, but when
#      prompted for labels add:  tt-n150
#        ./config.sh --url https://github.com/tsingletaryTT/tt-developer-image \
#                    --token <TOKEN> \
#                    --labels tt-n150
#   4. Install and start as a systemd service so it survives reboots:
#        sudo ./svc.sh install
#        sudo ./svc.sh start
#   5. Give the runner Docker access (if not already):
#        sudo usermod -aG docker $USER   # or whichever user runs the service
#        # then restart the svc or re-login
#
# Registry:
#   Images are published to GHCR using the built-in GITHUB_TOKEN — no extra
#   secrets needed.
#     ghcr.io/tsingletarytttt/tt-developer-image:latest
#     ghcr.io/tsingletarytttt/tt-developer-image:sha-<short-sha>
#
# Triggers:
#   push to main (docker/** changes) → build + smoke test + push to GHCR
#   pull_request to main             → build + smoke test (no push)
#   workflow_dispatch                → manual: build + smoke test + push

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/docker-build.yml"

  pull_request:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/docker-build.yml"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build, smoke-test & publish
    # Runs on the N150 host so we can pass /dev/tenstorrent into the
    # test container and verify the image works against real hardware.
    runs-on: [self-hosted, tt-n150]

    permissions:
      contents: read
      packages: write   # required to push to GHCR via GITHUB_TOKEN

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Docker Buildx
      # ----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------
      # 3. Log in to GHCR (skipped on PRs from forks)
      # ----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 4. Compute tags + OCI labels
      #      latest          — main branch only
      #      main            — branch name
      #      sha-<short>     — every build
      #      pr-<n>          — pull requests
      # ----------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      # ----------------------------------------------------------------
      # 5. Build and load image into the local Docker daemon.
      #    We use load:true / push:false here so the image is immediately
      #    available for the smoke-test steps below.  We push explicitly
      #    in step 7 after the tests pass.
      #
      #    Build context is docker/ — the Dockerfile COPYs scripts from
      #    there (scripts/build_tt_metal.sh, scripts/setup_envs.sh).
      #
      #    GHA layer cache dramatically speeds up re-builds when only
      #    late-stage layers change (e.g. version bumps in setup_envs.sh).
      # ----------------------------------------------------------------
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile
          load: true    # loads into local daemon — required for smoke tests
          push: false   # we push after tests pass (see step 7)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # 6. Smoke tests — run against the freshly built local image.
      #
      #    ${{ steps.build.outputs.imageid }} is the sha256 image ID, so
      #    these always reference exactly the image we just built regardless
      #    of tag aliasing.
      #
      #    Tests 6a–6c each source one env and verify the key package
      #    imports without errors.  Test 6a also passes the N150 device
      #    because TTNN may probe hardware during initialisation.
      # ----------------------------------------------------------------

      - name: Smoke test 6a — N150 device visible + TTNN import
        # Passes /dev/tenstorrent so the container can see the card.
        # If your host uses hugepages add:
        #   -v /dev/hugepages-1G:/dev/hugepages-1G
        run: |
          docker run --rm \
            --device /dev/tenstorrent \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              echo '--- device check ---'
              ls -la /dev/tenstorrent
              echo '--- TTNN import ---'
              source /etc/profile.d/tt-env-metal.sh
              python -c \"import ttnn; print('TTNN OK, version:', ttnn.__version__)\"
            "

      - name: Smoke test 6b — vLLM + torch import
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-vllm.sh
              python -c \"
          import torch, vllm
          print('torch:', torch.__version__)
          print('vLLM: ', vllm.__version__ if hasattr(vllm,'__version__') else 'ok')
              \"
            "

      - name: Smoke test 6c — TT-Forge-ONNX import
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-forge.sh
              python -c \"import tt_forge_onnx; print('TT-Forge-ONNX OK:', tt_forge_onnx.__name__)\"
            "

      # ----------------------------------------------------------------
      # 7. Push to GHCR — only after all smoke tests pass, and only on
      #    non-PR events (push to main or manual dispatch).
      #
      #    We push each computed tag explicitly since we used load:true
      #    (not push:true) in the build step above.
      # ----------------------------------------------------------------
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            echo "Pushing $tag"
            docker push "$tag"
          done

      # ----------------------------------------------------------------
      # 8. Clean up — remove the locally loaded image so the runner disk
      #    doesn't fill up across builds.  Uses the image ID so it removes
      #    even if all tags were already pushed/retagged.
      # ----------------------------------------------------------------
      - name: Clean up local image
        if: always()
        run: docker rmi ${{ steps.build.outputs.imageid }} || true
