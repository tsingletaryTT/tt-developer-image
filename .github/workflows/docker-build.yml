# .github/workflows/docker-build.yml
#
# Builds and publishes the Tenstorrent N150 developer image in "checkout" mode
# — tt-metal is cloned but not compiled.  This keeps the image buildable on
# standard GitHub-hosted runners (no huge disk / long compile required).
#
# Build modes (TT_METAL_BUILD arg):
#
#   checkout  (this workflow, DEFAULT)
#     - Runs on: ubuntu-latest (GitHub-hosted, free)
#     - What you get: all tooling + source trees present; tt-metal/vLLM not
#       compiled.  Good for iterating on Dockerfile layers, testing Forge,
#       shipping a "ready to build" dev container.
#
#   full  (manual / self-hosted)
#     - Requires a self-hosted runner on the N150 host with 100+ GB disk.
#     - Trigger manually via workflow_dispatch once a runner is registered,
#       or wire up a second workflow that passes --build-arg TT_METAL_BUILD=full.
#     - See the runner registration instructions that were removed from this file
#       when checkout mode became the default.  They live in git history.
#
# Registry:
#   ghcr.io/tsingletarytttt/tt-developer-image
#   Tags: latest (main), sha-<short> (every build), pr-<n> (PRs)
#   Auth: built-in GITHUB_TOKEN — no extra secrets needed.
#
# Triggers:
#   push to main (docker/** changes) → build + 3 smoke tests + push to GHCR
#   pull_request to main             → build + 3 smoke tests, no push
#   workflow_dispatch                → manual build + push

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/docker-build.yml"

  pull_request:
    branches:
      - main
    paths:
      - "docker/**"
      - ".github/workflows/docker-build.yml"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (checkout mode), smoke-test & publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to GHCR via GITHUB_TOKEN

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Docker Buildx
      # ----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------
      # 3. Log in to GHCR (skipped on PRs from forks)
      # ----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 4. Compute tags + OCI labels
      #      latest          — main branch only
      #      main            — branch name
      #      sha-<short>     — every build
      #      pr-<n>          — pull requests
      # ----------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      # ----------------------------------------------------------------
      # 5. Build and load into the local Docker daemon.
      #
      #    TT_METAL_BUILD=checkout  — clone only, no compilation.
      #    This is what makes the image buildable on hosted runners.
      #
      #    Build context is docker/ (Dockerfile COPYs scripts/ from there).
      #    GHA layer cache speeds up repeat builds when only late-stage
      #    layers change (e.g. Forge version bump, workflow tweaks).
      # ----------------------------------------------------------------
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile
          build-args: |
            TT_METAL_BUILD=checkout
          load: true    # loads into local daemon for smoke tests below
          push: false   # pushed explicitly in step 7 after tests pass
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----------------------------------------------------------------
      # 6. Smoke tests appropriate for checkout mode.
      #
      #    We can't test TTNN dispatch (no compiled bindings) or vLLM
      #    (not installed) in this mode.  Instead we verify:
      #      6a — tt-metal source tree is present at the pinned commit
      #      6b — tt-vllm source tree was cloned successfully
      #      6c — TT-Forge-ONNX and pjrt_plugin_tt import in venv-forge
      #           (Forge is always pip-installed; pjrt_plugin_tt is copied
      #            from ghcr.io/tenstorrent/tt-xla-slim via multi-stage build)
      # ----------------------------------------------------------------

      - name: "Smoke test 6a — tt-metal source tree at pinned commit"
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              echo '--- TT_METAL_HOME ---'
              echo \$TT_METAL_HOME
              test -d \"\$TT_METAL_HOME\" || (echo 'ERROR: tt-metal dir missing' && exit 1)
              echo '--- HEAD commit ---'
              git -C \"\$TT_METAL_HOME\" log -1 --format='%H  %s'
              echo 'tt-metal checkout OK'
            "

      - name: "Smoke test 6b — tt-vllm source tree present"
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              test -d \"\$HOME/tt-vllm\" || (echo 'ERROR: tt-vllm dir missing' && exit 1)
              echo '--- tt-vllm HEAD ---'
              git -C \"\$HOME/tt-vllm\" log -1 --format='%H  %s'
              echo 'tt-vllm checkout OK'
            "

      - name: "Smoke test 6c — TT-Forge-ONNX + pjrt_plugin_tt imports"
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-forge.sh
              python -c \"import forge; print('TT-Forge-ONNX (forge) OK:', forge.__name__)\"
              python -c \"import pjrt_plugin_tt; print('pjrt_plugin_tt OK:', pjrt_plugin_tt.__name__)\"
            "

      - name: "Smoke test 6d — hf CLI available in venv-metal"
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-metal.sh
              hf --version
              echo 'hf CLI OK'
            "

      - name: "Smoke test 6e — TT_METAL_ARCH_NAME default + override"
        run: |
          docker run --rm \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-metal.sh
              [ \"\$TT_METAL_ARCH_NAME\" = 'wormhole_b0' ] || (echo 'ERROR: expected wormhole_b0, got '\$TT_METAL_ARCH_NAME && exit 1)
              echo 'Default arch OK: '\$TT_METAL_ARCH_NAME
            "
          docker run --rm \
            -e TT_METAL_ARCH_NAME=blackhole \
            ${{ steps.build.outputs.imageid }} \
            bash -c "
              set -e
              source /etc/profile.d/tt-env-metal.sh
              [ \"\$TT_METAL_ARCH_NAME\" = 'blackhole' ] || (echo 'ERROR: expected blackhole, got '\$TT_METAL_ARCH_NAME && exit 1)
              echo 'Override arch OK: '\$TT_METAL_ARCH_NAME
            "

      # ----------------------------------------------------------------
      # 7. Push to GHCR after all smoke tests pass.
      #    Skipped on PRs — build-only validation is enough there.
      # ----------------------------------------------------------------
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            echo "Pushing $tag"
            docker push "$tag"
          done

      # ----------------------------------------------------------------
      # 8. Remove the locally loaded image to keep runner disk clean.
      # ----------------------------------------------------------------
      - name: Clean up local image
        if: always()
        run: docker rmi ${{ steps.build.outputs.imageid }} || true
